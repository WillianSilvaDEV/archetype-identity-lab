<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script>document.documentElement.classList.add("js");</script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin · Leads — Brand Maker</title>
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#050505">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="styles.css">

  <style>
    /* ===================================================================
       ADMIN — estilos próprios (sobrepõem styles.css quando necessário)
       =================================================================== */
    body { background: var(--brand-bg); }

    /* Login screen */
    .admin-login {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .admin-login-card {
      width: 100%;
      max-width: 26rem;
      padding: 2rem;
      border: 1px solid var(--brand-line);
      background: rgba(255, 255, 255, 0.02);
      border-radius: 0.75rem;
    }
    .admin-login-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--brand-muted);
      margin-bottom: 1.5rem;
    }
    .admin-login-eyebrow::before {
      content: "";
      width: 2rem;
      height: 1px;
      background: var(--brand-neon);
    }
    .admin-login h1 {
      font-size: 1.75rem;
      line-height: 1.1;
      letter-spacing: -0.035em;
      margin: 0 0 0.5rem;
      color: #fff;
    }
    .admin-login h1 .neon { color: var(--brand-neon); }
    .admin-login p.sub {
      font-size: 0.85rem;
      color: var(--brand-muted);
      margin: 0 0 1.5rem;
    }
    .admin-login form { display: flex; flex-direction: column; gap: 0.75rem; }
    .admin-error {
      color: #fca5a5;
      font-size: 0.8rem;
      margin: 0;
      min-height: 1.2em;
    }

    /* Table screen */
    .admin-app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .admin-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      padding: 1rem 1.25rem;
      background: rgba(5, 5, 5, 0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--brand-line);
    }
    .admin-bar h1 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: -0.02em;
      color: #fff;
      font-weight: 600;
    }
    .admin-bar h1 .count {
      display: inline-block;
      margin-left: 0.5rem;
      padding: 0.15rem 0.5rem;
      border: 1px solid var(--brand-line);
      border-radius: 9999px;
      font-size: 0.7rem;
      color: var(--brand-neon);
      letter-spacing: 0.1em;
    }
    .admin-bar .spacer { flex: 1; }
    .admin-bar input[type="search"] {
      width: 16rem;
      max-width: 100%;
      padding: 0.55rem 0.9rem;
      border: 1px solid var(--brand-line);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 0.375rem;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
    }
    .admin-bar input[type="search"]:focus {
      border-color: var(--brand-neon);
      background: rgba(255, 255, 255, 0.05);
    }
    .btn-secondary {
      padding: 0.55rem 0.9rem;
      border: 1px solid var(--brand-line);
      background: rgba(255, 255, 255, 0.03);
      color: #fff;
      border-radius: 0.375rem;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 200ms;
    }
    .btn-secondary:hover {
      border-color: var(--brand-neon);
      background: rgba(215, 255, 0, 0.05);
      color: var(--brand-neon);
    }
    .btn-primary {
      padding: 0.55rem 0.9rem;
      background: var(--brand-neon);
      color: #000;
      border-radius: 0.375rem;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 200ms;
    }
    .btn-primary:hover { background: var(--brand-neon-soft); }
    .btn-primary.full { width: 100%; padding: 0.875rem; }

    /* Table */
    .admin-table-wrap {
      flex: 1;
      overflow: auto;
      padding: 0 1.25rem 2rem;
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      table-layout: auto;
    }
    .admin-table thead th {
      position: sticky;
      top: 0;
      background: #0c0c0c;
      color: rgba(255, 255, 255, 0.7);
      text-align: left;
      padding: 0.85rem 0.85rem;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 500;
      border-bottom: 1px solid var(--brand-line);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .admin-table thead th:hover { color: var(--brand-neon); }
    .admin-table thead th.sort-asc::after { content: " ↑"; color: var(--brand-neon); }
    .admin-table thead th.sort-desc::after { content: " ↓"; color: var(--brand-neon); }
    .admin-table tbody td {
      padding: 0.75rem 0.85rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      color: #e5e5e5;
      vertical-align: top;
    }
    .admin-table tbody tr:hover td { background: rgba(255, 255, 255, 0.02); }
    .admin-table tbody td .muted { color: var(--brand-muted); font-size: 0.75rem; }
    .admin-table tbody td a {
      color: var(--brand-neon);
      text-decoration: none;
      border-bottom: 1px dashed transparent;
    }
    .admin-table tbody td a:hover { border-bottom-color: var(--brand-neon); }

    .admin-empty {
      text-align: center;
      padding: 4rem 1.5rem;
      color: var(--brand-muted);
    }
    .admin-empty h2 {
      font-size: 1.25rem;
      color: #fff;
      margin: 0 0 0.5rem;
    }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      border-radius: 9999px;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      white-space: nowrap;
    }
    .badge.optin-yes { background: rgba(215, 255, 0, 0.12); color: var(--brand-neon); }
    .badge.optin-no { background: rgba(248, 113, 113, 0.1); color: #fca5a5; }

    .hidden { display: none !important; }

    /* Toast (reuso simples) */
    .admin-toast {
      position: fixed;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.75rem 1.25rem;
      background: #0a1a0a;
      color: #86efac;
      border: 1px solid rgba(34,197,94,0.4);
      border-radius: 0.375rem;
      font-size: 0.85rem;
      box-shadow: 0 12px 32px -8px rgba(0,0,0,0.6);
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms;
      z-index: 100;
    }
    .admin-toast.show { opacity: 1; }

    @media (max-width: 640px) {
      .admin-bar input[type="search"] { width: 100%; }
      .admin-bar h1 { width: 100%; }
      .admin-table { font-size: 0.75rem; }
      .admin-table thead th,
      .admin-table tbody td { padding: 0.5rem 0.5rem; }
    }
  </style>
</head>
<body>

  <!-- ============== LOGIN SCREEN ============== -->
  <div id="login-screen" class="admin-login">
    <div class="admin-login-card">
      <div class="admin-login-eyebrow">Acesso restrito</div>
      <h1>Painel de <span class="neon">Leads</span></h1>
      <p class="sub">Entre com suas credenciais de administrador.</p>

      <form id="login-form" novalidate>
        <input class="input" type="email" name="email" placeholder="E-mail" autocomplete="email" required>
        <input class="input" type="password" name="password" placeholder="Senha" autocomplete="current-password" required>
        <p id="login-error" class="admin-error"></p>
        <button class="btn-primary full" type="submit">ENTRAR</button>
      </form>
    </div>
  </div>

  <!-- ============== APP / TABELA ============== -->
  <div id="app-screen" class="admin-app hidden">

    <div class="admin-bar">
      <h1>Leads <span class="count" id="lead-count">0</span></h1>
      <div class="spacer"></div>
      <input type="search" id="search" placeholder="Buscar nome, email, whatsapp...">
      <button class="btn-secondary" id="btn-refresh" title="Atualizar">↻</button>
      <button class="btn-secondary" id="btn-copy" title="Copiar como Excel">Copiar p/ Excel</button>
      <button class="btn-secondary" id="btn-export">Exportar CSV</button>
      <button class="btn-secondary" id="btn-logout">Sair</button>
    </div>

    <div class="admin-table-wrap">
      <table class="admin-table" id="leads-table">
        <thead>
          <tr>
            <th data-sort="nome">Nome</th>
            <th data-sort="whatsapp">WhatsApp</th>
            <th data-sort="email">E-mail</th>
            <th data-sort="colaboradores">Empresa</th>
            <th data-sort="origem">Origem</th>
            <th data-sort="optin_whatsapp">Opt-in</th>
            <th data-sort="created_at" class="sort-desc">Cadastro</th>
          </tr>
        </thead>
        <tbody id="leads-body"></tbody>
      </table>

      <div id="empty-state" class="admin-empty hidden">
        <h2>Nenhum lead ainda</h2>
        <p>Quando alguém preencher o formulário do site, vai aparecer aqui.</p>
      </div>
    </div>

  </div>

  <div id="toast" class="admin-toast">Copiado!</div>

  <script src="admin.js" defer></script>
</body>
</html>
